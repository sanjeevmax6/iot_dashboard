name: Deploy IoT Dashboard

# One-click full stack deployment — spins up all AWS resources from scratch.

# Required GitHub Secrets (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID     — IAM user access key
#   AWS_SECRET_ACCESS_KEY — IAM user secret key
#   AWS_ACCOUNT_ID        — 12-digit AWS account number

on:
  workflow_dispatch:

jobs:
  deploy:
    name: End to End Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # AWS credentials 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Node (needed for AWS CDK in TypeScript)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: infra/cdk/package-lock.json

      - name: Install CDK dependencies
        working-directory: infra/cdk
        run: npm ci

      # CDK Bootstrap
      # Handles three edge cases:
      # 1. Fresh account: neither stack nor bucket exists — bootstrap creates both.
      # 2. Stack exists but bucket was manually deleted (drift) — delete the drifted
      #    stack first, then re-bootstrap so CloudFormation owns the new bucket.
      # 3. Bucket exists but stack doesn't (e.g. destroy deleted the stack but left
      #    the bucket) — empty and delete the orphaned bucket so bootstrap can
      #    create a new one cleanly. This was the failure mode that caused:
      #    "Resource AWS::S3::Bucket already exists".
      - name: Bootstrap CDK environment
        working-directory: infra/cdk
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="cdk-hnb659fds-assets-${ACCOUNT_ID}-us-east-1"

          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name CDKToolkit --region us-east-1 \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          BUCKET_EXISTS=false
          aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null && BUCKET_EXISTS=true

          if [ "$STACK_STATUS" != "DOES_NOT_EXIST" ] && [ "$BUCKET_EXISTS" = "false" ]; then
            # Case 2: stack exists but bucket is gone — delete drifted stack
            echo "CDKToolkit stack exists but S3 bucket is missing (drift). Deleting stack..."
            aws cloudformation delete-stack --stack-name CDKToolkit --region us-east-1
            aws cloudformation wait stack-delete-complete --stack-name CDKToolkit --region us-east-1
            echo "Drifted stack deleted. Proceeding with fresh bootstrap."

          elif [ "$STACK_STATUS" = "DOES_NOT_EXIST" ] && [ "$BUCKET_EXISTS" = "true" ]; then
            # Case 3: orphaned bucket from a previous destroy — clean it up first.
            # Must delete all versions and delete markers before the bucket itself,
            # because CDK enables versioning on the staging bucket. aws s3 rm only
            # removes current versions; old versions and delete markers block DeleteBucket
            # with BucketNotEmpty even after rm --recursive.
            echo "Orphaned CDK staging bucket found (no CDKToolkit stack). Emptying and deleting..."
            aws s3 rm s3://$BUCKET --recursive

            # Delete all non-current object versions
            aws s3api list-object-versions --bucket "$BUCKET" \
              --query 'Versions[].{Key:Key,VersionId:VersionId}' \
              --output text 2>/dev/null | while read KEY VER; do
              [ -z "$KEY" ] && continue
              aws s3api delete-object --bucket "$BUCKET" --key "$KEY" --version-id "$VER" > /dev/null
            done

            # Delete all delete markers
            aws s3api list-object-versions --bucket "$BUCKET" \
              --query 'DeleteMarkers[].{Key:Key,VersionId:VersionId}' \
              --output text 2>/dev/null | while read KEY VER; do
              [ -z "$KEY" ] && continue
              aws s3api delete-object --bucket "$BUCKET" --key "$KEY" --version-id "$VER" > /dev/null
            done

            aws s3api delete-bucket --bucket "$BUCKET" --region us-east-1
            echo "Orphaned bucket deleted. Proceeding with fresh bootstrap."

          else
            echo "CDKToolkit and S3 bucket both exist — bootstrap will be a no-op."
          fi

          npx cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/us-east-1
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

      # Step 1: Deploy VPC and ECR
      # These must exist before we can push the Docker image.
      - name: Deploy VPC and ECR stacks
        working-directory: infra/cdk
        run: npx cdk deploy IotDashboardVpc IotDashboardEcr --require-approval never
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

      # Step 2: Build and push backend Docker image
      # IMPORTANT: must use --platform linux/amd64.
      # GitHub Actions runners and Mac Apple Silicon (arm64) both produce arm64
      # images by default. AWS Fargate uses x86_64 — deploying an arm64 image
      # causes the ECS circuit breaker to fire with:
      # "image Manifest does not contain descriptor matching platform 'linux/amd64'"
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: iot-dashboard-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 \
            -t $REGISTRY/$REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$REPOSITORY:latest \
            ./backend
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest

      # Step 3: Deploy ECS stack
      # The image now exists in ECR so the ECS circuit breaker won't fire.
      # Also handles stacks stuck in ROLLBACK_COMPLETE (from a prior failed
      # deploy where ECS tried to start tasks before the image was pushed).
      # CloudFormation won't let you update a ROLLBACK_COMPLETE stack — it must
      # be deleted first.
      - name: Clear any failed ECS stack
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name IotDashboardEcs --region us-east-1 \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "IotDashboardEcs status: $STATUS"
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STATUS" = "CREATE_FAILED" ]; then
            echo "Deleting failed stack before redeployment..."
            aws cloudformation delete-stack --stack-name IotDashboardEcs --region us-east-1
            aws cloudformation wait stack-delete-complete --stack-name IotDashboardEcs --region us-east-1
            echo "Stack deleted."
          fi

      - name: Deploy ECS stack
        working-directory: infra/cdk
        run: npx cdk deploy IotDashboardEcs --require-approval never
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

      # Step 4: Deploy Frontend infrastructure
      - name: Deploy Frontend stack
        working-directory: infra/cdk
        run: npx cdk deploy IotDashboardFrontend --require-approval never
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

      # Step 5: Build and deploy frontend
      # S3 bucket name and CloudFront distribution ID are read from CloudFormation
      # outputs — no hardcoded variables needed.
      - name: Set up Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Read CDK stack outputs
        id: outputs
        run: |
          S3_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name IotDashboardFrontend --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='S3BucketName'].OutputValue" \
            --output text)
          CF_ID=$(aws cloudformation describe-stacks \
            --stack-name IotDashboardFrontend --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          CF_URL=$(aws cloudformation describe-stacks \
            --stack-name IotDashboardFrontend --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" \
            --output text)
          echo "s3_bucket=$S3_BUCKET" >> $GITHUB_OUTPUT
          echo "cf_id=$CF_ID" >> $GITHUB_OUTPUT
          echo "cf_url=$CF_URL" >> $GITHUB_OUTPUT

      - name: Sync frontend to S3
        run: aws s3 sync frontend/dist/ s3://${{ steps.outputs.outputs.s3_bucket }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.cf_id }} \
            --paths "/*"

      # Summary
      - name: Print deployment summary
        run: |
          echo "## Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**App URL:** ${{ steps.outputs.outputs.cf_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "CloudFront may take 1-2 minutes to fully propagate on first deploy." >> $GITHUB_STEP_SUMMARY

          echo ""
          echo "=========================================="
          echo "  DEPLOYMENT COMPLETE"
          echo "  App URL: ${{ steps.outputs.outputs.cf_url }}"
          echo "  CloudFront may take 1-2 min to propagate"
          echo "=========================================="
          echo ""
