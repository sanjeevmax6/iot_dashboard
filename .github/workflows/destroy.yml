name: Destroy IoT Dashboard

# Tears down all AWS resources created by the deploy workflow.
# Safe to run multiple times — skips resources that are already gone.

# Required GitHub Secrets (same as deploy):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_ACCOUNT_ID

on:
  workflow_dispatch:

jobs:
  destroy:
    name: End to End Teardown
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: infra/cdk/package-lock.json

      - name: Install CDK dependencies
        working-directory: infra/cdk
        run: npm ci

      # Clean up stuck stacks FIRST
      # Stacks in ROLLBACK_COMPLETE or DELETE_FAILED block cdk destroy --all.
      # continue-on-error: one stuck stack shouldn't prevent others from being cleaned up.
      - name: Clean up stuck stacks
        continue-on-error: true
        run: |
          for STACK in IotDashboardFrontend IotDashboardEcs IotDashboardEcr IotDashboardVpc; do
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name $STACK --region us-east-1 \
              --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
            echo "$STACK: $STATUS"
            if [ "$STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STATUS" = "DELETE_FAILED" ]; then
              echo "Force-deleting stuck stack: $STACK"
              aws cloudformation delete-stack --stack-name $STACK --region us-east-1
              aws cloudformation wait stack-delete-complete --stack-name $STACK --region us-east-1
              echo "$STACK deleted."
            fi
          done

      # Empty S3 bucket before CDK destroy
      # CDK sets autoDeleteObjects: true which uses a Lambda to empty the bucket
      # on destroy. However if the Lambda itself fails (e.g. a prior partial
      # destroy), CloudFormation leaves the bucket and the whole destroy fails.
      # Pre-emptively emptying it here makes destroy reliable.
      # continue-on-error: if the frontend stack is already gone, this is a no-op.
      - name: Empty S3 bucket
        continue-on-error: true
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name IotDashboardFrontend --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='S3BucketName'].OutputValue" \
            --output text 2>/dev/null || echo "")
          if [ -n "$BUCKET" ] && [ "$BUCKET" != "None" ]; then
            echo "Emptying bucket: $BUCKET"
            aws s3 rm s3://$BUCKET --recursive
          else
            echo "Frontend stack not found or already destroyed — skipping bucket empty."
          fi

      # CDK destroy all stacks
      # CDK automatically destroys in reverse dependency order:
      # IotDashboardFrontend → IotDashboardEcs → IotDashboardEcr → IotDashboardVpc
      - name: CDK destroy all stacks
        working-directory: infra/cdk
        run: npx cdk destroy --all --force
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

      # Deregister ECS task definitions
      # CloudFormation cannot delete task definitions (AWS platform limit) — they
      # must be deregistered explicitly to avoid accumulating across deploy cycles.
      - name: Deregister ECS task definitions
        run: |
          TASK_DEFS=$(aws ecs list-task-definitions \
            --region us-east-1 \
            --status ACTIVE \
            --query 'taskDefinitionArns[]' --output text 2>/dev/null || echo "")
          if [ -n "$TASK_DEFS" ]; then
            for ARN in $TASK_DEFS; do
              echo "Deregistering $ARN"
              aws ecs deregister-task-definition --task-definition "$ARN" --region us-east-1 > /dev/null
            done
            echo "All task definition revisions deregistered."
          else
            echo "No active task definitions found — skipping."
          fi

      # Delete Container Insights log group
      # containerInsightsV2 auto-creates this log group outside of CloudFormation,
      # so CDK destroy does not touch it.
      - name: Delete Container Insights log group
        run: |
          LOG_GROUP="/aws/ecs/containerinsights/iot-dashboard/performance"
          EXISTS=$(aws logs describe-log-groups \
            --log-group-name-prefix "$LOG_GROUP" \
            --region us-east-1 \
            --query 'logGroups[0].logGroupName' \
            --output text 2>/dev/null || echo "")
          if [ "$EXISTS" = "$LOG_GROUP" ]; then
            echo "Deleting log group: $LOG_GROUP"
            aws logs delete-log-group --log-group-name "$LOG_GROUP" --region us-east-1
          else
            echo "Log group not found — skipping."
          fi

      # Delete CDKToolkit bootstrap stack and its S3 bucket
      # cdk destroy --all only destroys app stacks — the bootstrap stack and its
      # staging S3 bucket survive unless explicitly removed.
      # Deletes all object versions and delete markers before the bucket itself,
      # because CDK enables versioning — aws s3 rm only removes current versions.
      # continue-on-error: cleanup step, shouldn't fail the whole workflow.
      - name: Destroy CDKToolkit bootstrap stack
        continue-on-error: true
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="cdk-hnb659fds-assets-${ACCOUNT_ID}-us-east-1"

          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Emptying CDK bootstrap bucket: $BUCKET"
            aws s3 rm s3://$BUCKET --recursive

            aws s3api list-object-versions --bucket "$BUCKET" \
              --query 'Versions[].{Key:Key,VersionId:VersionId}' \
              --output text 2>/dev/null | while read KEY VER; do
              [ -z "$KEY" ] && continue
              aws s3api delete-object --bucket "$BUCKET" --key "$KEY" --version-id "$VER" > /dev/null
            done

            aws s3api list-object-versions --bucket "$BUCKET" \
              --query 'DeleteMarkers[].{Key:Key,VersionId:VersionId}' \
              --output text 2>/dev/null | while read KEY VER; do
              [ -z "$KEY" ] && continue
              aws s3api delete-object --bucket "$BUCKET" --key "$KEY" --version-id "$VER" > /dev/null
            done

            aws s3api delete-bucket --bucket "$BUCKET" --region us-east-1
            echo "CDK bootstrap bucket deleted."
          fi

          STATUS=$(aws cloudformation describe-stacks \
            --stack-name CDKToolkit --region us-east-1 \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          if [ "$STATUS" != "DOES_NOT_EXIST" ]; then
            echo "Deleting CDKToolkit stack..."
            aws cloudformation delete-stack --stack-name CDKToolkit --region us-east-1
            aws cloudformation wait stack-delete-complete --stack-name CDKToolkit --region us-east-1
            echo "CDKToolkit deleted."
          else
            echo "CDKToolkit already gone — skipping."
          fi

      - name: Teardown summary
        run: |
          echo "## Teardown complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All IoT Dashboard AWS resources have been destroyed." >> $GITHUB_STEP_SUMMARY
